<svg viewBox="0 0 940 760" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" font-size="12">
  <title>CVMFS GC and Lifecycle Cleanup Architecture</title>
  <desc>Shows per-repo cleanup policy, access tracking from Stratum1/S3/internal log sources, GC pipeline with namespace cleaner and CAS reaper, tombstone/soft-delete, and integration with existing spool and lease infrastructure</desc>

  <defs>
    <marker id="a"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#888"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5BAD6F"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#E8954A"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#D45B5B"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#9B7FD4"/></marker>
  </defs>

  <rect width="940" height="760" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="470" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111">CVMFS Lifecycle Cleanup — GC Subsystem</text>

  <!-- ROW 1: ACCESS DATA SOURCES -->
  <rect x="30" y="38" width="880" height="112" rx="8" fill="#EEF4FB" stroke="#C0D4EC"/>
  <text x="470" y="57" text-anchor="middle" font-size="11" font-weight="700" fill="#4A90D9">ACCESS DATA SOURCES  ·  passive collection, no client changes</text>

  <rect x="48" y="64" width="130" height="70" rx="6" fill="#fff" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="113" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#4A90D9">Stratum 1 Logs</text>
  <text x="113" y="99" text-anchor="middle" font-size="10" fill="#555">configurable log format</text>
  <text x="113" y="113" text-anchor="middle" font-size="10" fill="#555">path → hash → time</text>
  <text x="113" y="127" text-anchor="middle" font-size="10" fill="#aaa">primary source</text>

  <rect x="200" y="64" width="130" height="70" rx="6" fill="#fff" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="265" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#4A90D9">HTTP Receiver</text>
  <text x="265" y="99" text-anchor="middle" font-size="10" fill="#555">POST /access-events</text>
  <text x="265" y="113" text-anchor="middle" font-size="10" fill="#555">any source, any proxy</text>
  <text x="265" y="127" text-anchor="middle" font-size="10" fill="#aaa">push-based, generic</text>

  <rect x="352" y="64" width="130" height="70" rx="6" fill="#fff" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="417" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#4A90D9">CAS Backend Logs</text>
  <text x="417" y="99" text-anchor="middle" font-size="10" fill="#555">S3 events / inotify</text>
  <text x="417" y="113" text-anchor="middle" font-size="10" fill="#555">hash-level granularity</text>
  <text x="417" y="127" text-anchor="middle" font-size="10" fill="#aaa">proxy-agnostic</text>

  <rect x="504" y="64" width="140" height="70" rx="6" fill="#fff" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="574" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#4A90D9">Publish Event Log</text>
  <text x="574" y="99" text-anchor="middle" font-size="10" fill="#555">pre-publisher emits</text>
  <text x="574" y="113" text-anchor="middle" font-size="10" fill="#555">last_written baseline</text>
  <text x="574" y="127" text-anchor="middle" font-size="10" fill="#aaa">lower bound on access</text>

  <rect x="666" y="64" width="140" height="70" rx="6" fill="#E8F4FF" stroke="#4A90D9" stroke-width="2"/>
  <text x="736" y="84" text-anchor="middle" font-size="11" font-weight="700" fill="#4A90D9">AccessTracker DB</text>
  <text x="736" y="99" text-anchor="middle" font-size="10" fill="#555">SQLite / BoltDB</text>
  <text x="736" y="113" text-anchor="middle" font-size="10" fill="#555">path+hash → last_seen</text>
  <text x="736" y="127" text-anchor="middle" font-size="10" fill="#aaa">per-repo, partitioned</text>

  <line x1="178" y1="99" x2="199" y2="99" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="330" y1="99" x2="351" y2="99" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="482" y1="99" x2="503" y2="99" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#ab)"/>
  <line x1="644" y1="99" x2="665" y2="99" stroke="#4A90D9" stroke-width="1.2" marker-end="url(#ab)"/>

  <!-- ROW 2: POLICY ENGINE -->
  <rect x="30" y="162" width="880" height="88" rx="8" fill="#F5F0FF" stroke="#C9B8EA"/>
  <text x="470" y="181" text-anchor="middle" font-size="11" font-weight="700" fill="#9B7FD4">PER-REPOSITORY CLEANUP POLICY</text>

  <rect x="48" y="188" width="310" height="52" rx="6" fill="#fff" stroke="#9B7FD4" stroke-width="1.5"/>
  <text x="203" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#9B7FD4">CleanupPolicy  (per repo, in repo config)</text>
  <text x="203" y="220" text-anchor="middle" font-size="10" fill="#555">access_ttl · soft_delete_period · schedule (cron)</text>
  <text x="203" y="234" text-anchor="middle" font-size="10" fill="#555">exempt_tags · exempt_paths (glob) · dry_run · enabled</text>

  <rect x="378" y="188" width="160" height="52" rx="6" fill="#fff" stroke="#9B7FD4" stroke-width="1.5"/>
  <text x="458" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#9B7FD4">Policy Engine</text>
  <text x="458" y="220" text-anchor="middle" font-size="10" fill="#555">evaluates TTL vs AccessTracker</text>
  <text x="458" y="234" text-anchor="middle" font-size="10" fill="#555">produces CandidateSet</text>

  <rect x="558" y="188" width="150" height="52" rx="6" fill="#fff" stroke="#9B7FD4" stroke-width="1.5"/>
  <text x="633" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#9B7FD4">GC Scheduler</text>
  <text x="633" y="220" text-anchor="middle" font-size="10" fill="#555">cron + on-demand trigger</text>
  <text x="633" y="234" text-anchor="middle" font-size="10" fill="#555">per-repo serialised runs</text>

  <rect x="728" y="188" width="165" height="52" rx="6" fill="#fff" stroke="#9B7FD4" stroke-width="1.5"/>
  <text x="810" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#9B7FD4">Tag Exemption Check</text>
  <text x="810" y="220" text-anchor="middle" font-size="10" fill="#555">walks tag history catalog</text>
  <text x="810" y="234" text-anchor="middle" font-size="10" fill="#555">prunes candidates in tags</text>

  <line x1="358" y1="214" x2="377" y2="214" stroke="#9B7FD4" stroke-width="1.2" marker-end="url(#ap)"/>
  <line x1="538" y1="214" x2="557" y2="214" stroke="#9B7FD4" stroke-width="1.2" marker-end="url(#ap)"/>
  <line x1="708" y1="214" x2="727" y2="214" stroke="#9B7FD4" stroke-width="1.2" marker-end="url(#ap)"/>
  <line x1="736" y1="134" x2="736" y2="162" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <line x1="736" y1="162" x2="458" y2="162" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="458" y1="162" x2="458" y2="187" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ab)"/>

  <!-- ROW 3: GC PIPELINE -->
  <rect x="30" y="262" width="880" height="154" rx="8" fill="#F0FBF2" stroke="#B2DEB9"/>
  <text x="470" y="281" text-anchor="middle" font-size="11" font-weight="700" fill="#5BAD6F">GC PIPELINE  ·  runs per-repo, serialised, with lease</text>

  <rect x="48" y="290" width="145" height="112" rx="6" fill="#fff" stroke="#5BAD6F" stroke-width="1.5"/>
  <text x="120" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#5BAD6F">Reference Counter</text>
  <text x="120" y="326" text-anchor="middle" font-size="10" fill="#555">walks all catalogs</text>
  <text x="120" y="340" text-anchor="middle" font-size="10" fill="#555">all repo tags</text>
  <text x="120" y="354" text-anchor="middle" font-size="10" fill="#555">builds: hash → refcount</text>
  <text x="120" y="368" text-anchor="middle" font-size="10" fill="#555">nested catalog chunks</text>
  <text x="120" y="384" text-anchor="middle" font-size="10" fill="#aaa">safe to remove if rc=0</text>

  <rect x="213" y="290" width="150" height="112" rx="6" fill="#fff" stroke="#5BAD6F" stroke-width="1.5"/>
  <text x="288" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#5BAD6F">Namespace Cleaner</text>
  <text x="288" y="326" text-anchor="middle" font-size="10" fill="#555">acquires gateway lease</text>
  <text x="288" y="340" text-anchor="middle" font-size="10" fill="#555">removes catalog rows</text>
  <text x="288" y="354" text-anchor="middle" font-size="10" fill="#555">for expired paths</text>
  <text x="288" y="368" text-anchor="middle" font-size="10" fill="#555">updates parent dirs</text>
  <text x="288" y="384" text-anchor="middle" font-size="10" fill="#aaa">commits via /payloads</text>

  <rect x="383" y="290" width="150" height="112" rx="6" fill="#fff" stroke="#5BAD6F" stroke-width="1.5"/>
  <text x="458" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#5BAD6F">Tombstone Manager</text>
  <text x="458" y="326" text-anchor="middle" font-size="10" fill="#555">soft-delete: marks</text>
  <text x="458" y="340" text-anchor="middle" font-size="10" fill="#555">hashes as pending-GC</text>
  <text x="458" y="354" text-anchor="middle" font-size="10" fill="#555">in tombstone.db</text>
  <text x="458" y="368" text-anchor="middle" font-size="10" fill="#555">waits soft_delete_period</text>
  <text x="458" y="384" text-anchor="middle" font-size="10" fill="#aaa">re-checks refcount</text>

  <rect x="553" y="290" width="150" height="112" rx="6" fill="#fff" stroke="#D45B5B" stroke-width="1.5"/>
  <text x="628" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#D45B5B">CAS Reaper</text>
  <text x="628" y="326" text-anchor="middle" font-size="10" fill="#555">hard-deletes CAS objects</text>
  <text x="628" y="340" text-anchor="middle" font-size="10" fill="#555">confirms rc=0 again</text>
  <text x="628" y="354" text-anchor="middle" font-size="10" fill="#555">S3 delete / unlink</text>
  <text x="628" y="368" text-anchor="middle" font-size="10" fill="#555">batched, rate-limited</text>
  <text x="628" y="384" text-anchor="middle" font-size="10" fill="#aaa">writes deletion receipt</text>

  <rect x="723" y="290" width="165" height="112" rx="6" fill="#FFF8EE" stroke="#E8954A" stroke-width="1.5"/>
  <text x="805" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#E8954A">Audit + Dry-Run Log</text>
  <text x="805" y="326" text-anchor="middle" font-size="10" fill="#555">JSONL per GC run</text>
  <text x="805" y="340" text-anchor="middle" font-size="10" fill="#555">what-would-be-deleted</text>
  <text x="805" y="354" text-anchor="middle" font-size="10" fill="#555">in dry_run mode</text>
  <text x="805" y="368" text-anchor="middle" font-size="10" fill="#555">deletion receipts</text>
  <text x="805" y="384" text-anchor="middle" font-size="10" fill="#aaa">signed + retained</text>

  <line x1="193" y1="346" x2="212" y2="346" stroke="#5BAD6F" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="363" y1="346" x2="382" y2="346" stroke="#5BAD6F" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="533" y1="346" x2="552" y2="346" stroke="#5BAD6F" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="703" y1="346" x2="722" y2="346" stroke="#5BAD6F" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="458" y1="250" x2="458" y2="261" stroke="#9B7FD4" stroke-width="1.2" marker-end="url(#ap)"/>

  <!-- ROW 4: GC JOB SPOOL STATE MACHINE -->
  <rect x="30" y="428" width="880" height="98" rx="8" fill="#FFFBF0" stroke="#E8C87A"/>
  <text x="470" y="447" text-anchor="middle" font-size="11" font-weight="700" fill="#C8922A">GC JOB SPOOL STATE MACHINE  ·  same crash-safe rename model</text>

  <rect x="48" y="455" width="95" height="58" rx="5" fill="#fff" stroke="#C8922A" stroke-width="1.5"/>
  <text x="95" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#C8922A">gc-scheduled/</text>
  <text x="95" y="490" text-anchor="middle" font-size="9" fill="#555">cron trigger</text>
  <text x="95" y="503" text-anchor="middle" font-size="9" fill="#aaa">manifest.json</text>

  <rect x="163" y="455" width="95" height="58" rx="5" fill="#fff" stroke="#C8922A" stroke-width="1.5"/>
  <text x="210" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#C8922A">gc-scanning/</text>
  <text x="210" y="490" text-anchor="middle" font-size="9" fill="#555">refcount + policy</text>

  <rect x="278" y="455" width="100" height="58" rx="5" fill="#fff" stroke="#C8922A" stroke-width="1.5"/>
  <text x="328" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#C8922A">ns-cleaning/</text>
  <text x="328" y="490" text-anchor="middle" font-size="9" fill="#555">lease held</text>
  <text x="328" y="503" text-anchor="middle" font-size="9" fill="#555">catalog update</text>

  <rect x="398" y="455" width="100" height="58" rx="5" fill="#fff" stroke="#C8922A" stroke-width="1.5"/>
  <text x="448" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#C8922A">tombstoned/</text>
  <text x="448" y="490" text-anchor="middle" font-size="9" fill="#555">soft-delete wait</text>
  <text x="448" y="503" text-anchor="middle" font-size="9" fill="#555">deadline in manifest</text>

  <rect x="518" y="455" width="100" height="58" rx="5" fill="#fff" stroke="#D45B5B" stroke-width="1.5"/>
  <text x="568" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#D45B5B">gc-reaping/</text>
  <text x="568" y="490" text-anchor="middle" font-size="9" fill="#555">CAS hard delete</text>
  <text x="568" y="503" text-anchor="middle" font-size="9" fill="#aaa">batched, resumable</text>

  <rect x="638" y="455" width="100" height="58" rx="5" fill="#F0FBF2" stroke="#5BAD6F" stroke-width="1.5"/>
  <text x="688" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#5BAD6F">gc-complete/</text>
  <text x="688" y="490" text-anchor="middle" font-size="9" fill="#555">audit log written</text>

  <rect x="758" y="455" width="100" height="58" rx="5" fill="#FFF0F0" stroke="#D45B5B" stroke-width="1.5"/>
  <text x="808" y="475" text-anchor="middle" font-size="10" font-weight="600" fill="#D45B5B">gc-aborted/</text>
  <text x="808" y="490" text-anchor="middle" font-size="9" fill="#555">lease released</text>
  <text x="808" y="503" text-anchor="middle" font-size="9" fill="#555">tombstones revoked</text>

  <line x1="143" y1="484" x2="162" y2="484" stroke="#C8922A" stroke-width="1.2" marker-end="url(#ao)"/>
  <line x1="258" y1="484" x2="277" y2="484" stroke="#C8922A" stroke-width="1.2" marker-end="url(#ao)"/>
  <line x1="378" y1="484" x2="397" y2="484" stroke="#C8922A" stroke-width="1.2" marker-end="url(#ao)"/>
  <line x1="498" y1="484" x2="517" y2="484" stroke="#C8922A" stroke-width="1.2" marker-end="url(#ao)"/>
  <line x1="618" y1="484" x2="637" y2="484" stroke="#C8922A" stroke-width="1.2" marker-end="url(#ao)"/>
  <path d="M448,513 Q448,545 700,545 Q808,545 808,513" fill="none" stroke="#D45B5B" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ar)"/>
  <line x1="288" y1="416" x2="288" y2="428" stroke="#5BAD6F" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ag)"/>

  <!-- ROW 5: CONFIG + SAFETY -->
  <rect x="30" y="554" width="425" height="180" rx="8" fill="#f7f7f7" stroke="#ddd"/>
  <text x="242" y="573" text-anchor="middle" font-size="11" font-weight="700" fill="#111">Repository Config  (YAML)</text>
  <text x="50" y="592" font-size="10" fill="#9B7FD4" font-family="monospace">gc:</text>
  <text x="50" y="608" font-size="10" fill="#5BAD6F" font-family="monospace">  enabled: true</text>
  <text x="50" y="624" font-size="10" fill="#5BAD6F" font-family="monospace">  access_ttl: 180d</text>
  <text x="50" y="640" font-size="10" fill="#5BAD6F" font-family="monospace">  soft_delete_period: 14d</text>
  <text x="50" y="656" font-size="10" fill="#5BAD6F" font-family="monospace">  schedule: "0 2 * * 0"   # weekly</text>
  <text x="50" y="672" font-size="10" fill="#5BAD6F" font-family="monospace">  dry_run: false</text>
  <text x="50" y="688" font-size="10" fill="#5BAD6F" font-family="monospace">  exempt_tags: [stable, lts-2024]</text>
  <text x="50" y="704" font-size="10" fill="#5BAD6F" font-family="monospace">  exempt_paths: ["/cvmfs/repo/critical/**"]</text>
  <text x="50" y="720" font-size="10" fill="#5BAD6F" font-family="monospace">  access_sources: [stratum1, cas, publish]</text>

  <rect x="475" y="554" width="435" height="180" rx="8" fill="#f7f7f7" stroke="#ddd"/>
  <text x="692" y="573" text-anchor="middle" font-size="11" font-weight="700" fill="#111">Safety Properties</text>

  <rect x="490" y="582" width="10" height="10" fill="#5BAD6F" rx="2"/>
  <text x="506" y="591" font-size="10" fill="#555">RefCounter walks all repo tags + nested catalogs before any deletion</text>
  <rect x="490" y="603" width="10" height="10" fill="#9B7FD4" rx="2"/>
  <text x="506" y="612" font-size="10" fill="#555">Tombstone period allows access re-detection before hard delete</text>
  <rect x="490" y="624" width="10" height="10" fill="#E8954A" rx="2"/>
  <text x="506" y="633" font-size="10" fill="#555">CAS Reaper re-checks refcount at deletion time (TOCTOU guard)</text>
  <rect x="490" y="645" width="10" height="10" fill="#4A90D9" rx="2"/>
  <text x="506" y="654" font-size="10" fill="#555">All GC runs are per-repo serialised — no concurrent GC + publish</text>
  <rect x="490" y="666" width="10" height="10" fill="#D45B5B" rx="2"/>
  <text x="506" y="675" font-size="10" fill="#555">dry_run produces full deletion plan with no state changes</text>
  <rect x="490" y="687" width="10" height="10" fill="#C8922A" rx="2"/>
  <text x="506" y="696" font-size="10" fill="#555">Abort at any spool state revokes tombstones, releases lease</text>
  <rect x="490" y="708" width="10" height="10" fill="#111" rx="2"/>
  <text x="506" y="717" font-size="10" fill="#555">Publish pipeline blocks if GC holds lease on overlapping path</text>
</svg>
