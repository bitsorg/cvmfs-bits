<svg viewBox="0 0 920 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" font-size="12">
  <title>Stratum 1 Receiver — Two-Channel Protocol</title>
  <desc>Sequence diagram showing the HTTPS control channel announce handshake and plain-HTTP data channel object PUT flow between the cvmfs-prepub distributor and the Stratum 1 receiver agent</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5BAD6F"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1ABC9C"/>
    </marker>
    <marker id="arr-back" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L8,6 L0,3 z" fill="#4A90D9"/>
    </marker>
    <marker id="arr-back-green" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#5BAD6F"/>
    </marker>
    <marker id="arr-back-teal" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#1ABC9C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="520" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="460" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Stratum 1 Receiver — Two-Channel Protocol</text>

  <!-- ═══════════════════ ACTOR BOXES ═══════════════════ -->

  <!-- Sender (cvmfs-prepub Distributor) -->
  <rect x="20" y="38" width="155" height="52" rx="6" fill="#4A90D9" opacity=".85"/>
  <text x="97" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">cvmfs-prepub</text>
  <text x="97" y="73" text-anchor="middle" font-size="10" fill="#ddf">Distributor</text>
  <text x="97" y="86" text-anchor="middle" font-size="9" fill="#ddf">(publisher node)</text>

  <!-- Control Channel actor -->
  <rect x="330" y="38" width="175" height="52" rx="6" fill="#E67E22" opacity=".85"/>
  <text x="417" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Control Channel</text>
  <text x="417" y="73" text-anchor="middle" font-size="10" fill="#fde">HTTPS :9100</text>
  <text x="417" y="86" text-anchor="middle" font-size="9" fill="#fde">announce endpoint</text>

  <!-- Data Channel actor -->
  <rect x="650" y="38" width="175" height="52" rx="6" fill="#1ABC9C" opacity=".85"/>
  <text x="737" y="58" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Data Channel</text>
  <text x="737" y="73" text-anchor="middle" font-size="10" fill="#d4efea">Plain HTTP :9101</text>
  <text x="737" y="86" text-anchor="middle" font-size="9" fill="#d4efea">objects endpoint</text>

  <!-- Lifelines -->
  <line x1="97"  y1="90" x2="97"  y2="500" stroke="#4A90D9" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="417" y1="90" x2="417" y2="500" stroke="#E67E22" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="737" y1="90" x2="737" y2="500" stroke="#1ABC9C" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>

  <!-- ═══════════════════ PHASE 1: CONTROL CHANNEL ANNOUNCE ═══════════════════ -->

  <!-- Phase label -->
  <rect x="10" y="106" width="145" height="14" rx="3" fill="#FEF9E7" stroke="#E67E22" stroke-width="1"/>
  <text x="82" y="117" text-anchor="middle" font-size="9" font-weight="600" fill="#E67E22">Phase 1 — Announce</text>

  <!-- Sender → Control: POST /api/v1/announce -->
  <line x1="97" y1="130" x2="415" y2="130" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="256" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#E67E22">POST /api/v1/announce</text>
  <text x="256" y="145" text-anchor="middle" font-size="9" fill="#888">X-Timestamp • X-Signature (HMAC-SHA256)</text>
  <!-- body annotation -->
  <rect x="158" y="150" width="196" height="38" rx="4" fill="#FEF9E7" stroke="#E8954A" stroke-width="1"/>
  <text x="256" y="163" text-anchor="middle" font-size="9" fill="#555">{ payload_id, object_count,</text>
  <text x="256" y="176" text-anchor="middle" font-size="9" fill="#555">  total_bytes }</text>

  <!-- Control processing activation box -->
  <rect x="407" y="192" width="20" height="54" rx="2" fill="#E67E22" opacity=".4"/>
  <!-- Processing steps annotation -->
  <rect x="434" y="192" width="200" height="54" rx="4" fill="#FEF3E7" stroke="#E67E22" stroke-width="1"/>
  <text x="444" y="206" font-size="9" fill="#555">① verify HMAC signature</text>
  <text x="444" y="220" font-size="9" fill="#555">② check available disk space</text>
  <text x="444" y="234" font-size="9" fill="#555">③ create session (TTL = 1 h)</text>
  <text x="444" y="247" font-size="9" fill="#555">④ store by payload_id (idempotent)</text>

  <!-- Control → Sender: 200 {session_token, data_endpoint} -->
  <line x1="417" y1="252" x2="99" y2="252" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="256" y="246" text-anchor="middle" font-size="10" font-weight="600" fill="#E67E22">200 OK</text>
  <rect x="112" y="255" width="232" height="24" rx="4" fill="#FEF9E7" stroke="#E8954A" stroke-width="1"/>
  <text x="228" y="271" text-anchor="middle" font-size="9" fill="#555">{ session_token, data_endpoint: "http://…:9101" }</text>

  <!-- ═══════════════════ PHASE 2: DATA CHANNEL OBJECT PUTS ═══════════════════ -->

  <!-- Phase label -->
  <rect x="10" y="292" width="145" height="14" rx="3" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="1"/>
  <text x="82" y="303" text-anchor="middle" font-size="9" font-weight="600" fill="#1ABC9C">Phase 2 — Object Transfer</text>

  <!-- Sender → Data: PUT /objects/{h1} -->
  <line x1="97" y1="317" x2="735" y2="317" stroke="#1ABC9C" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="416" y="311" text-anchor="middle" font-size="10" font-weight="600" fill="#1ABC9C">PUT /api/v1/objects/{hash}</text>

  <!-- Sender → Data: PUT /objects/{h2} (concurrent) -->
  <line x1="97" y1="334" x2="735" y2="334" stroke="#1ABC9C" stroke-width="1" stroke-dasharray="6,2" marker-end="url(#arr)"/>
  <text x="416" y="328" text-anchor="middle" font-size="9" fill="#888">Authorization: Bearer &lt;session_token&gt;</text>

  <!-- Sender → Data: PUT /objects/{hN} -->
  <line x1="97" y1="351" x2="735" y2="351" stroke="#1ABC9C" stroke-width="1" stroke-dasharray="6,2" marker-end="url(#arr)"/>
  <text x="416" y="359" text-anchor="middle" font-size="9" fill="#888">X-Content-SHA256: &lt;hex(SHA-256(body))&gt; • N concurrent</text>

  <!-- Data channel processing activation -->
  <rect x="727" y="366" width="20" height="80" rx="2" fill="#1ABC9C" opacity=".4"/>
  <!-- Processing steps annotation -->
  <rect x="490" y="366" width="234" height="80" rx="4" fill="#E8F8F5" stroke="#1ABC9C" stroke-width="1"/>
  <text x="500" y="380" font-size="9" fill="#555">① verify Bearer session token</text>
  <text x="500" y="394" font-size="9" fill="#555">② stream body → SHA-256 + temp file</text>
  <text x="500" y="408" font-size="9" fill="#555">③ compare X-Content-SHA256</text>
  <text x="500" y="422" font-size="9" fill="#555">④ fsync + atomic rename to CAS path</text>
  <text x="500" y="436" font-size="9" fill="#555">    {cas_root}/{hash[:2]}/{hash}C</text>

  <!-- Data → Sender: 200 OK -->
  <line x1="737" y1="452" x2="99" y2="452" stroke="#1ABC9C" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="416" y="446" text-anchor="middle" font-size="10" font-weight="600" fill="#1ABC9C">200 OK (per object, or idempotent if already present)</text>

  <!-- bottom note: fallback -->
  <rect x="10" y="474" width="510" height="30" rx="4" fill="#F4F4F4" stroke="#ccc" stroke-width="1"/>
  <text x="20" y="487" font-size="9" fill="#555" font-weight="600">Fallback:</text>
  <text x="70" y="487" font-size="9" fill="#555">if announce returns 404 (older receiver), sender falls back to legacy</text>
  <text x="20" y="499" font-size="9" fill="#555">PUT {endpoint}/cvmfs-receiver/objects/{hash} over HTTPS (no session token).</text>

</svg>
