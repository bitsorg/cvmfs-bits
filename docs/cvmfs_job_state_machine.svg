<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif" font-size="12">
  <title>CVMFS Pre-Publisher Job State Machine</title>
  <desc>Spool directory lifecycle showing state transitions from incoming through leased, staging, uploading, distributing (Option B), committing to published, with abort and failed error paths</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A90D9"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5BAD6F"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E8954A"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#C0392B"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8E44AD"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Job State Machine — Spool Directory Lifecycle</text>

  <!-- ═══════════════════ LEGEND ═══════════════════ -->
  <rect x="30" y="44" width="165" height="120" rx="6" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="112" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#555">Legend</text>
  <rect x="42" y="70" width="18" height="12" rx="3" fill="#4A90D9" opacity=".85"/>
  <text x="68" y="81" font-size="10" fill="#333">Entry state</text>
  <rect x="42" y="88" width="18" height="12" rx="3" fill="#EEF4FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="68" y="99" font-size="10" fill="#333">Active state</text>
  <rect x="42" y="106" width="18" height="12" rx="3" fill="#F5F0FF" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="68" y="117" font-size="10" fill="#333">Option B only</text>
  <rect x="42" y="124" width="18" height="12" rx="3" fill="#5BAD6F" opacity=".85"/>
  <text x="68" y="135" font-size="10" fill="#333">Terminal (success)</text>
  <rect x="42" y="142" width="18" height="12" rx="3" fill="#C0392B" opacity=".85"/>
  <text x="68" y="153" font-size="10" fill="#333">Terminal (failure)</text>

  <!-- ═══════════════════ MAIN FLOW (x=370 centre) ═══════════════════ -->

  <!-- INCOMING -->
  <rect x="292" y="48" width="155" height="40" rx="6" fill="#4A90D9" opacity=".9"/>
  <text x="370" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">incoming/</text>
  <!-- arrow ↓ -->
  <line x1="370" y1="88" x2="370" y2="118" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="530" y="107" font-size="10" fill="#555">lease acquired from cvmfs_gateway</text>

  <!-- LEASED -->
  <rect x="292" y="122" width="155" height="40" rx="6" fill="#EEF4FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="370" y="147" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">leased/</text>
  <!-- arrow ↓ -->
  <line x1="370" y1="162" x2="370" y2="192" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="530" y="181" font-size="10" fill="#555">tar extracted, files enumerated</text>

  <!-- STAGING -->
  <rect x="292" y="196" width="155" height="40" rx="6" fill="#EEF4FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="370" y="221" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">staging/</text>
  <!-- arrow ↓ -->
  <line x1="370" y1="236" x2="370" y2="266" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="530" y="255" font-size="10" fill="#555">compress + hash + dedup complete</text>

  <!-- UPLOADING -->
  <rect x="292" y="270" width="155" height="40" rx="6" fill="#EEF4FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="370" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">uploading/</text>
  <!-- arrow ↓ -->
  <line x1="370" y1="310" x2="370" y2="340" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="530" y="329" font-size="10" fill="#555">all objects confirmed in CAS backend</text>

  <!-- DISTRIBUTING (Option B — dashed purple) -->
  <rect x="292" y="344" width="155" height="44" rx="6" fill="#F5F0FF" stroke="#8E44AD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="370" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#8E44AD">distributing/</text>
  <text x="370" y="379" text-anchor="middle" font-size="9" fill="#8E44AD">(Option B only — skipped in A)</text>
  <!-- arrow ↓ -->
  <line x1="370" y1="388" x2="370" y2="418" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="530" y="407" font-size="10" fill="#555">quorum of Stratum 1 receivers confirmed</text>

  <!-- COMMITTING -->
  <rect x="292" y="422" width="155" height="40" rx="6" fill="#EEF4FB" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="370" y="447" text-anchor="middle" font-size="13" font-weight="600" fill="#4A90D9">committing/</text>
  <!-- arrow ↓ -->
  <line x1="370" y1="462" x2="370" y2="492" stroke="#5BAD6F" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="530" y="481" font-size="10" fill="#555">manifest signed by cvmfs_gateway</text>

  <!-- PUBLISHED (terminal success) -->
  <rect x="292" y="496" width="155" height="40" rx="6" fill="#5BAD6F" opacity=".9"/>
  <text x="370" y="521" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">published/</text>
  <!-- terminal indicator -->
  <rect x="292" y="536" width="155" height="5" rx="2" fill="#3D8B55" opacity=".7"/>

  <!-- ═══════════════════ ERROR PATH ═══════════════════ -->

  <!-- elbow from UPLOADING right → ABORTED  (route via x=560 elbow) -->
  <path d="M447,290 L560,290 L560,390" fill="none" stroke="#E8954A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="564" y="340" font-size="10" fill="#E8954A">any non-terminal state</text>

  <!-- ABORTED -->
  <rect x="622" y="370" width="155" height="40" rx="6" fill="#FFF4E6" stroke="#E8954A" stroke-width="1.5"/>
  <text x="700" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#E8954A">aborted/</text>

  <!-- ABORTED → FAILED -->
  <line x1="700" y1="410" x2="700" y2="440" stroke="#C0392B" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="710" y="429" font-size="9" fill="#C0392B">abort itself fails</text>
  <text x="710" y="440" font-size="9" fill="#C0392B">(operator required)</text>

  <!-- FAILED (terminal error) -->
  <rect x="622" y="444" width="155" height="40" rx="6" fill="#C0392B" opacity=".85"/>
  <text x="700" y="469" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">failed/</text>
  <rect x="622" y="484" width="155" height="5" rx="2" fill="#922B21" opacity=".7"/>

  <!-- Recovery annotation (bottom) -->
  <rect x="30" y="460" width="250" height="82" rx="6" fill="#FFFBEE" stroke="#E8B84A" stroke-width="1"/>
  <text x="40" y="478" font-size="10" font-weight="600" fill="#7D6010">Crash Recovery (on restart)</text>
  <text x="40" y="493" font-size="9" fill="#555">incoming/ → re-acquire lease, restart</text>
  <text x="40" y="507" font-size="9" fill="#555">leased/ → resume from unpack</text>
  <text x="40" y="521" font-size="9" fill="#555">uploading/ → re-issue idempotent PUTs</text>
  <text x="40" y="535" font-size="9" fill="#555">distributing/ → re-push unconfirmed S1s</text>

</svg>
